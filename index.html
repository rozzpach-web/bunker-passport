        body {
            font-family: 'Courier New', Courier, monospace;
            background-color: #0d1117;
            color: #c9d1d9;

            padding: 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

            color: #da3633;
            text-align: center;
            text-transform: uppercase;
            letter-spacing: 2px;
            border-bottom: 2px solid #da3633;
            padding-bottom: 10px;
            width: 100%;
            max-width: 450px;
            font-size: 20px;
        }
        .status-box {
            background-color: #161b22;
            border: 1px solid #30363d;
            padding: 10px;
            border-radius: 6px;
            text-align: center;
            margin-bottom: 15px;
            width: 100%;
            max-width: 430px;
            color: #8b949e;
            font-size: 13px;
        }
        .passport-container {
            width: 100%;
            max-width: 450px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .card {
            background-color: #161b22;
            border: 1px solid #30363d;
            border-left: 5px solid #58a6ff;
            border-radius: 6px;
            padding: 12px 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }
        .card-content {
            flex-grow: 1;
            padding-right: 10px;
        }
        .card-title {
            font-size: 12px;
            color: #8b949e;
            text-transform: uppercase;
            margin-bottom: 4px;
            letter-spacing: 1px;
        }
        .card-value {
            font-size: 15px;
            font-weight: bold;
            color: #f0f6fc;
            line-height: 1.3;
        }
        .share-btn {
            background-color: #21262d;
            color: #58a6ff;
            border: 1px solid #30363d;
            padding: 8px 12px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 11px;
            font-weight: bold;
            text-transform: uppercase;
            transition: all 0.2s;
            white-space: nowrap;
        }
        .share-btn:hover {

            color: #ffffff;
            border-color: #388bfd;
        }
    </style>
</head>

        function getRandomItem(array) {
            return array[Math.floor(Math.random() * array.length)];
        }

        function shareCharacteristic(type, value) {
            const dataToSend = {
                action: "share_characteristic",
                type: type,
                value: value
            };
            
            // ВІДПРАВЛЯЄМО ДАНІ (Тут виправлено помилку з великими літерами JSON)
            tg.sendData(JSON.stringify(dataToSend));
        }

        const container = document.getElementById('passport');
        
        // Генеруємо картки за твоїм новим списком категорій
        Object.keys(db).forEach(category => {
            const randomValue = getRandomItem(db[category]);
            
            const card = document.createElement('div');
            card.className = 'card';
            
            const content = document.createElement('div');
            content.className = 'card-content';
            
            const title = document.createElement('div');
            title.className = 'card-title';
            title.innerText = category;
            
            const value = document.createElement('div');
            value.className = 'card-value';
            value.innerText = randomValue;
            
            const button = document.createElement('button');
            button.className = 'share-btn';
            button.innerText = "Розкрити";
            
            button.onclick = function() {
                shareCharacteristic(category, randomValue);
            };
            
            content.appendChild(title);
            content.appendChild(value);
            card.appendChild(content);
            card.appendChild(button);
            container.appendChild(card);
        });

</html>
